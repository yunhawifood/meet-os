<!DOCTYPE html>

<html lang="ko">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>매장 주문하기</title>

  <style>

    * {

      box-sizing: border-box;

    }

    body {

      margin: 0;

      background: #ffffff;

      color: #171717;

      font-family: -apple-system, BlinkMacSystemFont,

        "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;

    }

    .wrap {

      width: 100%;

      max-width: 480px;

      margin: 0 auto;

      padding: 24px 16px 40px;

    }

    .top {

      margin-bottom: 24px;

      text-align: center;

    }

    .top h1 {

      margin: 0;

      color: #164f2f;

      font-size: 34px;

      font-weight: 900;

      letter-spacing: -2px;

    }

    .top p {

      margin: 12px 0 0;

      font-size: 17px;

      font-weight: 600;

      color: #444;

    }

    .top strong {

      color: #c91d1d;

    }

    .product-grid {

      display: grid;

      grid-template-columns: repeat(2, minmax(0, 1fr));

      gap: 12px;

    }

    .product-card {

      border: 1px solid #eeeeee;

      border-radius: 20px;

      overflow: hidden;

      background: #ffffff;

      box-shadow: 0 7px 18px rgba(0, 0, 0, 0.06);

      cursor: pointer;

    }

    .product-image {

      aspect-ratio: 1 / 0.82;

      background: #f2f2f2;

      display: flex;

      align-items: center;

      justify-content: center;

      font-size: 48px;

    }

    .product-info {

      padding: 14px 10px 16px;

      text-align: center;

    }

    .product-name {

      display: block;

      margin-bottom: 8px;

      font-size: 20px;

      font-weight: 900;

    }

    .product-unit {

      margin-right: 6px;

      font-size: 14px;

      color: #666;

    }

    .product-price {

      color: #c91d1d;

      font-size: 19px;

      font-weight: 900;

    }

    .product-price.inquiry {

      color: #bd6417;

    }

    .contact-card {

      background: #fffaf2;

    }

    .contact-box {

      margin-top: 18px;

      padding: 17px 14px;

      border: 1px solid #f0d88a;

      border-radius: 18px;

      background: #fffaf2;

      text-align: center;

      font-size: 17px;

      font-weight: 800;

    }

    .talk {

      display: inline-block;

      margin-right: 8px;

      padding: 5px 8px;

      border-radius: 9px;

      background: #ffe500;

      color: #191600;

      font-size: 13px;

      font-weight: 900;

    }

  </style>

</head>

<body>

  <main class="wrap">

    <section class="top">

      <h1>매장 주문하기</h1>

      <p><strong>500g</strong> 단위로 선택 가능합니다.</p>

    </section>

    <section class="product-grid">

      <div class="product-card" onclick="openWeightSheet()">
     
        <div class="product-image">🥓</div>

        <div class="product-info">

          <span class="product-name">삼겹살</span>

          <span class="product-unit">100g</span>

          <span class="product-price">3,200원</span>

        </div>

      </div>

      <div class="product-card">

        <div class="product-image">🥩</div>

        <div class="product-info">

          <span class="product-name">목살</span>

          <span class="product-unit">100g</span>

          <span class="product-price">2,700원</span>

        </div>

      </div>

      <div class="product-card">

        <div class="product-image">🍖</div>

        <div class="product-info">

          <span class="product-name">앞다리</span>

          <span class="product-unit">100g</span>

          <span class="product-price">1,700원</span>

        </div>

      </div>

      <div class="product-card">

        <div class="product-image">🥩</div>

        <div class="product-info">

          <span class="product-name">알사태</span>

          <span class="product-unit">100g</span>

          <span class="product-price">990원</span>

        </div>

      </div>

      <div class="product-card">

        <div class="product-image">🍖</div>

        <div class="product-info">

          <span class="product-name">갈비</span>

          <span class="product-unit">100g</span>

          <span class="product-price inquiry">가격 문의</span>

        </div>

      </div>

      <div class="product-card">

        <div class="product-image">🍖</div>

        <div class="product-info">

          <span class="product-name">등갈비</span>

          <span class="product-unit">100g</span>

          <span class="product-price inquiry">가격 문의</span>

        </div>

      </div>

      <div class="product-card">

        <div class="product-image">🥩</div>

        <div class="product-info">

          <span class="product-name">등심</span>

          <span class="product-unit">100g</span>

          <span class="product-price inquiry">가격 문의</span>

        </div>

      </div>

      <div class="product-card">

        <div class="product-image">🥩</div>

        <div class="product-info">

          <span class="product-name">안심</span>

          <span class="product-unit">100g</span>

          <span class="product-price inquiry">가격 문의</span>

        </div>

      </div>

      <div class="product-card">

        <div class="product-image">🥓</div>

        <div class="product-info">

          <span class="product-name">항정살</span>

          <span class="product-unit">100g</span>

          <span class="product-price inquiry">가격 문의</span>

        </div>

      </div>

      <div class="product-card">

        <div class="product-image">🥩</div>

        <div class="product-info">

          <span class="product-name">가브리살</span>

          <span class="product-unit">100g</span>

          <span class="product-price inquiry">가격 문의</span>

        </div>

      </div>

      <div class="product-card">

        <div class="product-image">🥩</div>

        <div class="product-info">

          <span class="product-name">갈매기살</span>

          <span class="product-unit">100g</span>

          <span class="product-price inquiry">가격 문의</span>

        </div>

      </div>

      <div class="product-card contact-card">

        <div class="product-image">🐄</div>

        <div class="product-info">

          <span class="product-name">한우 문의</span>

          <span class="product-unit">100g</span>

          <span class="product-price inquiry">가격 문의</span>

        </div>

      </div>

    </section>

    <div class="contact-box">

      <span class="talk">TALK</span>

      찾으시는 상품이 없으세요? 편하게 문의해주세요.

    </div>

  </main>
  <div

    id="sheetOverlay"

    onclick="closeWeightSheet()"

    style="

      display: none;

      position: fixed;

      inset: 0;

      background: rgba(0, 0, 0, 0.38);

      z-index: 100;

    "

  ></div>

  <section

    id="weightSheet"

    style="

      position: fixed;

      left: 50%;

      bottom: 0;

      transform: translate(-50%, 110%);

      width: min(100%, 480px);

      padding: 18px 16px 28px;

      background: #ffffff;

      border-radius: 26px 26px 0 0;

      box-shadow: 0 -12px 35px rgba(0, 0, 0, 0.18);

      transition: transform 0.25s ease;

      z-index: 101;

    "

  >

    <div

      style="

        width: 46px;

        height: 5px;

        margin: 0 auto 18px;

        border-radius: 999px;

        background: #dddddd;

      "

    ></div>

    <div

      style="

        display: flex;

        align-items: center;

        justify-content: space-between;

        margin-bottom: 18px;

      "

    >

      <h2 style="margin: 0; font-size: 23px;">삼겹살 중량 선택</h2>

      <button

        type="button"

        onclick="closeWeightSheet()"

        style="

          width: 40px;

          height: 40px;

          border: 0;

          border-radius: 50%;

          background: #f2f2f2;

          font-size: 22px;

        "

      >

        ×

      </button>

    </div>

    <div

      style="

        display: grid;

        grid-template-columns: repeat(2, 1fr);

        gap: 10px;

      "

    >

      <button type="button" onclick="selectWeight('500g', '16,000원')">

        500g<br><strong>16,000원</strong>

      </button>

      <button type="button" onclick="selectWeight('1kg', '32,000원')">

        1kg<br><strong>32,000원</strong>

      </button>

      <button type="button" onclick="selectWeight('1.5kg', '48,000원')">

        1.5kg<br><strong>48,000원</strong>

      </button>

      <button type="button" onclick="selectWeight('2kg', '64,000원')">

        2kg<br><strong>64,000원</strong>

      </button>

    </div>

  </section>
<button

  <button

  id="cartBar"

  type="button"

  onclick="showCart()"  
  
  style="

    display: none;

    position: fixed;

    left: 50%;

    bottom: 16px;

    transform: translateX(-50%);

    width: min(calc(100% - 28px), 452px);

    padding: 17px 20px;

    border: 0;

    border-radius: 20px;

    background: #164f2f;

    color: #ffffff;

    font-size: 17px;

    font-weight: 900;

    box-shadow: 0 12px 30px rgba(22, 79, 47, 0.28);

    z-index: 90;

  "

>

  장바구니 보기 · <span id="cartCount">0</span>개

</button>
  <script>

    function openWeightSheet() {

      document.getElementById("sheetOverlay").style.display = "block";

      document.getElementById("weightSheet").style.transform =

        "translate(-50%, 0)";

    }

    function closeWeightSheet() {

      document.getElementById("sheetOverlay").style.display = "none";

      document.getElementById("weightSheet").style.transform =

        "translate(-50%, 110%)";

    }

let cart = [];

function selectWeight(weight, price) {

  cart.push({

    product: "삼겹살",

    weight: weight,

    price: price

  });

  document.getElementById("cartCount").textContent = cart.length;

  document.getElementById("cartBar").style.display = "block";

  closeWeightSheet();

}

function showCart() {

  let cartText = "장바구니\n\n";

  cart.forEach(function(item, index) {

    cartText +=

      (index + 1) +

      ". " +

      item.product +

      " " +

      item.weight +

      " · " +

      item.price +

      "\n";

  });

  alert(cartText);

}  </script>

</body>

</html>

<!DOCTYPE html>

<html lang="ko">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>한농직판장 | 내 손안의 정육점</title>

  <style>

    * {

      box-sizing: border-box;

    }

    body {

      margin: 0;

      background: #ffffff;

      color: #171717;

      font-family: -apple-system, BlinkMacSystemFont,

        "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;

      text-align: center;

    }

    .wrap {

      width: 100%;

      max-width: 480px;

      margin: 0 auto;

      padding: 16px 18px 28px;

    }

    .store-photo {

      display: block;

      width: 100%;

      height: 145px;

      object-fit: cover;

      object-position: center 35%;

      border-radius: 24px;

    }

    .hero {

      padding: 18px 4px 16px;

    }

    h1 {

      margin: 0;

      font-size: 38px;

      line-height: 1.15;

      font-weight: 900;

      letter-spacing: -2.5px;

    }

    .tagline {

      margin: 16px 0 0;

      color: #6d6d6d;

      font-size: 17px;

      font-weight: 600;

      letter-spacing: -0.5px;

    }

    .main-buttons {

    display: grid;

    grid-template-columns: repeat(2, minmax(0, 1fr));

    gap: 12px;

    width: 100%;

}
    

    .main-button {

      aspect-ratio: 1 / 1;

      border: 0;

      border-radius: 27px;

      color: white;

      padding: 20px 14px;

      font-family: inherit;

      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.13);

      cursor: pointer;

    }

    .store-order {

      background: #c92721;

    }

    .morning-delivery {

      background: #2f8a46;

    }

    .icon {

      display: flex;

      align-items: center;

      justify-content: center;

      width: 64px;

      height: 64px;

      margin: 0 auto 15px;

      border-radius: 50%;

      background: rgba(255, 255, 255, 0.17);

      font-size: 32px;

    }

    .main-button strong {

      display: block;

      font-size: 24px;

      line-height: 1.2;

      font-weight: 850;

      letter-spacing: -1px;

    }

    .main-button small {

      display: block;

      margin-top: 16px;

      padding-top: 15px;

      border-top: 1px solid rgba(255, 255, 255, 0.55);

      font-size: 15px;

      line-height: 1.45;

      font-weight: 600;

    }

    .origin {

      margin: 23px 0 0;

      color: #666666;

      font-size: 17px;

      font-weight: 700;

    }

    .start-title {

      display: flex;

      align-items: center;

      gap: 13px;

      margin: 31px 0 18px;

      font-size: 18px;

      font-weight: 800;

      white-space: nowrap;

    }

    .start-title::before,

    .start-title::after {

      content: "";

      flex: 1;

      height: 1px;

      background: #e5e5e5;

    }

    .login-buttons {

      display: grid;

      grid-template-columns: 1fr 1fr;

      gap: 12px;

    }

    .login-button {

      height: 76px;

      border: 1px solid #eeeeee;

      border-radius: 20px;

      background: white;

      display: flex;

      align-items: center;

      justify-content: center;

      gap: 9px;

      padding: 0 10px;

      font-family: inherit;

      font-size: 13px;

      font-weight: 800;

      white-space: nowrap;
      
      box-shadow: 0 7px 18px rgba(0, 0, 0, 0.07);

      cursor: pointer;

    }

    .kakao-logo,

    .naver-logo {

      display: flex;

      align-items: center;

      justify-content: center;

      width: 34px;

      height: 34px;

      flex-shrink: 0;

      font-weight: 900;

    }

    .kakao-logo {

      background: #fee500;

      border-radius: 9px;

      color: #111111;

      font-size: 11px;

    }

    .naver-logo {

      background: #03c75a;

      border-radius: 4px;

      color: white;

      font-size: 23px;

    }

    .footer {

      margin: 29px 0 0;

      color: #969696;

      font-size: 14px;

      line-height: 1.6;

    }

    @media (max-width: 360px) {

      .wrap {

        padding-left: 13px;

        padding-right: 13px;

      }

      .store-photo {

        height: 180px;

      }

      h1 {

        font-size: 36px;

      }

      .main-buttons {

        gap: 10px;

      }

      .main-button {

        padding: 17px 10px;

      }

      .main-button strong {

        font-size: 24px;

      }

      .main-button small {

        font-size: 13px;

      }

    }

  </style>

</head>

<body>

  <main class="wrap">

    <img

      class="store-photo"

      src="IMG_1920.jpeg"

      alt="한농직판장 매장 전경"

    />

    <section class="hero">

      <h1>내 손안의 정육점</h1>

      <p class="tagline">고기가 생각날 때 언제 어디서든!</p>

    </section>

    <section class="main-buttons">

      <button

        class="main-button store-order"

        type="button"

        onclick="alert('매장 주문 화면은 다음 단계에서 연결합니다.')"

      >

        <span class="icon">🛍️</span>

        <strong>매장 주문</strong>

        <small>직접 방문하여 구매</small>

      </button>

      <button

        class="main-button morning-delivery"

        type="button"

        onclick="alert('아침 배송 화면은 다음 단계에서 연결합니다.')"

      >

        <span class="icon">🚚</span>

        <strong>아침 배송</strong>

        <small>전날 저녁9시까지 주문</small>

      </button>

    </section>

    <p class="origin">국내산 한우 · 한돈만 취급합니다.</p>

    <div class="start-title">간편하게 시작하기</div>

    <section class="login-buttons">

      <button

        class="login-button"

        type="button"

        onclick="alert('카카오 로그인은 추후 연결합니다.')"

      >

        <span class="kakao-logo">TALK</span>

        <span>카카오로 시작하기</span>

      </button>

      <button

        class="login-button"

        type="button"

        onclick="alert('네이버 로그인은 추후 연결합니다.')"

      >

        <span class="naver-logo">N</span>

        <span>네이버로 시작하기</span>

      </button>

    </section>

    <p class="footer">

      한농직판장은 항상 신선한 고기와 정직한 가격을 약속드립니다.

    </p>

  </main>

</body>

</html>

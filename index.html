<!DOCTYPE html>

<html lang="ko">

<head>

  <meta charset="UTF-8" />

  <meta

    name="viewport"

    content="width=device-width, initial-scale=1.0, viewport-fit=cover"

  />

  <meta name="theme-color" content="#edf6ff" />

  <title>한농직판장 | 내 손안의 정육점</title>

  <style>

    * {

      box-sizing: border-box;

    }

    html,

    body {

      min-height: 100%;

    }

    body {

      margin: 0;

      background:

        linear-gradient(

          180deg,

          #eaf4ff 0%,

          #f5f9fd 58%,

          #ffffff 100%

        );

      color: #17263b;

      font-family:

        -apple-system,

        BlinkMacSystemFont,

        "Apple SD Gothic Neo",

        "Noto Sans KR",

        sans-serif;

      text-align: center;

      -webkit-font-smoothing: antialiased;

    }

    button {

      font-family: inherit;

      -webkit-tap-highlight-color: transparent;

    }

    .wrap {

      width: 100%;

      max-width: 520px;

      min-height: 100dvh;

      margin: 0 auto;

      padding:

        calc(18px + env(safe-area-inset-top))

        18px

        calc(26px + env(safe-area-inset-bottom));

    }

    .brand-header {

      margin: 0 0 14px;

      text-align: center;

    }

    .brand-name {

      margin: 0;

      color: #174b78;

      font-size: 30px;

      line-height: 1.2;

      font-weight: 900;

      letter-spacing: -1.7px;

    }

    .brand-line {

      width: 34px;

      height: 3px;

      margin: 9px auto 0;

      border-radius: 999px;

      background: #5ea2e4;

    }

    .hero {

      width: 100%;

      margin: 0 auto 18px;

      overflow: hidden;

      border: 1px solid rgba(180, 208, 238, 0.72);

      border-radius: 26px;

      background: #ffffff;

      box-shadow:

        0 13px 30px rgba(43, 91, 140, 0.12);

    }

    .store-photo {

      display: block;

      width: 100%;

      height: 155px;

      object-fit: cover;

      object-position: center 38%;

    }

    .title-block {

      margin: 0 0 21px;

      text-align: center;

    }

    .title-block h1 {

      margin: 0;

      color: #10243f;

      font-size: clamp(34px, 9vw, 42px);

      line-height: 1.08;

      font-weight: 900;

      letter-spacing: -2.5px;

    }

    .title-block .tagline {

      margin: 9px 0 0;

      color: #6b7d92;

      font-size: 16px;

      line-height: 1.45;

      font-weight: 700;

      letter-spacing: -0.45px;

    }

    .main-buttons {

      display: grid;

      grid-template-columns: repeat(2, minmax(0, 1fr));

      gap: 12px;

      width: 100%;

    }

    .main-button {

      min-width: 0;

      min-height: 232px;

      padding: 22px 12px 16px;

      border: 1px solid #bed8f3;

      border-radius: 26px;

      background: rgba(249, 252, 255, 0.96);

      color: #164e89;

      box-shadow:

        0 11px 25px rgba(62, 111, 162, 0.13);

      cursor: pointer;

      display: flex;

      flex-direction: column;

      align-items: center;

      justify-content: flex-start;

      transition:

        transform 0.15s ease,

        box-shadow 0.15s ease;

    }

    .main-button:active {

      transform: scale(0.98);

      box-shadow:

        0 6px 15px rgba(62, 111, 162, 0.11);

    }

    .store-order {

      background: #f9fcff;

    }

    .morning-delivery {

      background: #eaf4ff;

      border-color: #9fc8ee;

    }

    .icon-wrap {

      width: 68px;

      height: 68px;

      margin-bottom: 15px;

      border-radius: 50%;

      background: #dcecff;

      box-shadow:

        inset 0 0 0 1px rgba(123, 171, 220, 0.13);

      display: flex;

      align-items: center;

      justify-content: center;

    }

    .icon {

      font-size: 32px;

      line-height: 1;

    }

    .main-button strong {

      display: block;

      margin-bottom: 12px;

      color: #15519a;

      font-size: 24px;

      line-height: 1.25;

      font-weight: 900;

      letter-spacing: -1.1px;

    }

    .main-button small {

      display: block;

      width: 100%;

      min-height: 52px;

      padding-top: 12px;

      border-top: 1px solid #d7e6f5;

      color: #536b84;

      font-size: 14px;

      line-height: 1.48;

      font-weight: 700;

      letter-spacing: -0.3px;

    }

    .arrow {

      width: 41px;

      height: 41px;

      margin-top: auto;

      border-radius: 50%;

      background: #2582e8;

      color: #ffffff;

      font-size: 24px;

      line-height: 38px;

      font-weight: 700;

      text-align: center;

      box-shadow:

        0 6px 13px rgba(37, 130, 232, 0.24);

    }

    .origin {

      margin: 18px 0 0;

      padding: 11px 14px;

      border: 1px solid #d7e7f7;

      border-radius: 999px;

      background: rgba(255, 255, 255, 0.68);

      color: #3f5872;

      font-size: 14px;

      line-height: 1.4;

      font-weight: 800;

      letter-spacing: -0.4px;

    }

    @media (max-width: 390px) {

      .wrap {

        padding:

          calc(13px + env(safe-area-inset-top))

          12px

          calc(22px + env(safe-area-inset-bottom));

      }

      .brand-header {

        margin-bottom: 11px;

      }

      .brand-name {

        font-size: 27px;

      }

      .hero {

        margin-bottom: 15px;

        border-radius: 23px;

      }

      .store-photo {

        height: 135px;

      }

      .title-block {

        margin-bottom: 17px;

      }

      .title-block h1 {

        font-size: 33px;

        letter-spacing: -2.1px;

      }

      .title-block .tagline {

        margin-top: 7px;

        font-size: 15px;

      }

      .main-buttons {

        gap: 9px;

      }

      .main-button {

        min-height: 218px;

        padding: 19px 9px 14px;

        border-radius: 23px;

      }

      .icon-wrap {

        width: 62px;

        height: 62px;

        margin-bottom: 13px;

      }

      .icon {

        font-size: 29px;

      }

      .main-button strong {

        font-size: 21px;

      }

      .main-button small {

        min-height: 50px;

        font-size: 12.5px;

      }

      .origin {

        margin-top: 15px;

        font-size: 13px;

      }

    }

  </style>

</head>

<body>

  <main class="wrap">

    <header class="brand-header">

      <p class="brand-name">한농직판장</p>

      <div class="brand-line"></div>

    </header>

    <section class="hero">

      <img

        class="store-photo"

        src="IMG_1920.jpeg"

        alt="한농직판장 매장 사진"

      />

    </section>

    <section class="title-block">

      <h1>내 손안의 정육점</h1>

      <p class="tagline">

        언제 어디서나 간편하게!

      </p>

    </section>

    <section class="main-buttons" aria-label="주문 방법 선택">

      <button

        class="main-button store-order"

        type="button"

        onclick="location.href='Store-order.html'"

      >

        <span class="icon-wrap">

          <span class="icon">🛍️</span>

        </span>

        <strong>매장 주문</strong>

        <small>

          상품을 미리 골라<br />

          편하게 찾아가세요

        </small>

        <span class="arrow">→</span>

      </button>

      <button

        class="main-button morning-delivery"

        type="button"

        onclick="location.href='morning-delivery.html'"

      >

        <span class="icon-wrap">

          <span class="icon">🚚</span>

        </span>

        <strong>아침 배송</strong>

        <small>

          오늘 저녁 9시까지 주문<br />

          다음 날 아침 배송

        </small>

        <span class="arrow">→</span>

      </button>

    </section>

    <p class="origin">

      국내산 한우 · 한돈만 취급합니다.

    </p>

  </main>

</body>

</html>

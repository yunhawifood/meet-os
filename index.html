<!DOCTYPE html>

<html lang="ko">

<head>

  <meta charset="UTF-8" />

  <meta

    name="viewport"

    content="width=device-width, initial-scale=1.0"

  />

  <title>한농직판장 | 내 손안의 정육점</title>

  <style>

    * {

      box-sizing: border-box;

    }

    body {

      margin: 0;

      background:

        linear-gradient(

          180deg,

          #eaf4ff 0%,

          #f4f8fd 55%,

          #ffffff 100%

        );

      color: #17263b;

      font-family:

        -apple-system,

        BlinkMacSystemFont,

        "Apple SD Gothic Neo",

        "Noto Sans KR",

        sans-serif;

      text-align: center;

    }

    button {

      font-family: inherit;

      -webkit-tap-highlight-color: transparent;

    }

    .wrap {

      width: 100%;

      max-width: 520px;

      min-height: 100vh;

      margin: 0 auto;

      padding: 18px 18px 34px;

    }

    .hero {

      width: 100%;

      margin: 0 auto 28px;

      overflow: hidden;

      border: 1px solid rgba(180, 208, 238, 0.65);

      border-radius: 30px;

      background: #ffffff;

      box-shadow:

        0 16px 38px rgba(43, 91, 140, 0.12);

    }

    .store-photo {

      display: block;

      width: 100%;

      height: 180px;

      object-fit: cover;

      object-position: center 35%;

    }

    .hero-text {

      padding: 27px 18px 30px;

    }

    h1 {

      margin: 0;

      color: #10243f;

      font-size: 40px;

      line-height: 1.14;

      font-weight: 900;

      letter-spacing: -2.7px;

    }

    .tagline {

      margin: 15px 0 0;

      color: #6b7d92;

      font-size: 17px;

      line-height: 1.5;

      font-weight: 650;

      letter-spacing: -0.5px;

    }

    .main-buttons {

      display: grid;

      grid-template-columns: repeat(2, minmax(0, 1fr));

      gap: 14px;

      width: 100%;

    }

    .main-button {

      min-width: 0;

      min-height: 270px;

      padding: 27px 15px 19px;

      border: 1px solid #bed8f3;

      border-radius: 29px;

      background: rgba(249, 252, 255, 0.95);

      color: #164e89;

      box-shadow:

        0 13px 29px rgba(62, 111, 162, 0.14);

      cursor: pointer;

      display: flex;

      flex-direction: column;

      align-items: center;

      justify-content: flex-start;

      transition:

        transform 0.15s ease,

        box-shadow 0.15s ease;

    }

    .main-button:active {

      transform: scale(0.98);

      box-shadow:

        0 7px 17px rgba(62, 111, 162, 0.12);

    }

    .store-order {

      background: #f8fbff;

    }

    .morning-delivery {

      background: #eaf4ff;

      border-color: #9fc8ee;

    }

    .icon-wrap {

      width: 78px;

      height: 78px;

      margin-bottom: 20px;

      border-radius: 50%;

      background: #dcecff;

      box-shadow:

        inset 0 0 0 1px rgba(123, 171, 220, 0.12);

      display: flex;

      align-items: center;

      justify-content: center;

    }

    .icon {

      font-size: 36px;

      line-height: 1;

    }

    .main-button strong {

      display: block;

      margin-bottom: 15px;

      color: #15519a;

      font-size: 25px;

      line-height: 1.25;

      font-weight: 900;

      letter-spacing: -1.2px;

    }

    .main-button small {

      display: block;

      width: 100%;

      min-height: 58px;

      padding-top: 15px;

      border-top: 1px solid #d7e6f5;

      color: #536b84;

      font-size: 15px;

      line-height: 1.5;

      font-weight: 650;

      letter-spacing: -0.3px;

    }

    .arrow {

      width: 43px;

      height: 43px;

      margin-top: auto;

      border-radius: 50%;

      background: #2582e8;

      color: #ffffff;

      font-size: 25px;

      line-height: 40px;

      font-weight: 700;

      text-align: center;

      box-shadow:

        0 7px 14px rgba(37, 130, 232, 0.25);

    }

    .origin {

      margin: 25px 0 0;

      padding: 13px 15px;

      border: 1px solid #d7e7f7;

      border-radius: 999px;

      background: rgba(255, 255, 255, 0.65);

      color: #3f5872;

      font-size: 16px;

      line-height: 1.4;

      font-weight: 750;

      letter-spacing: -0.5px;

    }

    @media (max-width: 390px) {

      .wrap {

        padding:

          13px 12px 28px;

      }

      .store-photo {

        height: 160px;

      }

      h1 {

        font-size: 35px;

      }

      .main-buttons {

        gap: 10px;

      }

      .main-button {

        min-height: 245px;

        padding:

          23px 11px 16px;

        border-radius: 25px;

      }

      .icon-wrap {

        width: 68px;

        height: 68px;

      }

      .icon {

        font-size: 31px;

      }

      .main-button strong {

        font-size: 22px;

      }

      .main-button small {

        font-size: 13px;

      }

    }
.title-block {

  margin: 8px 0 26px;

  text-align: center;

}

.title-block h1 {

  width: 100%;

  margin: 0 auto;

  color: #10243f;

  font-size: clamp(42px, 11vw, 58px);

  line-height: 1.02;

  font-weight: 900;

  letter-spacing: -4px;

  white-space: nowrap;

  text-align: center;

}.title-block .tagline {

  margin: 14px 0 0;

  color: #6b7d92;

  font-size: 18px;

  font-weight: 700;

}

@media (max-width: 390px) {

  .title-block h1 {

    font-size: 42px;

  }

  .title-block .tagline {

    font-size: 16px;

  }

}  </style>

</head>

<body>

  <main class="wrap">

    <section class="hero">

  <img

    class="store-photo"

    src="IMG_1920.jpeg"

    alt="한농직판장 매장 사진"

  />

</section>

<section class="title-block">

  <h1>내 손안의 정육점</h1>

  <p class="tagline">언제 어디서나 간편하게!</p>

</section>    <section class="main-buttons">

      <button

        class="main-button store-order"

        type="button"

        onclick="location.href='Store-order.html'"

      >

        <span class="icon-wrap">

          <span class="icon">🛍️</span>

        </span>

        <strong>매장 주문</strong>

        <small>

          상품을 미리 골라<br />

          편하게 찾아가세요

        </small>

        <span class="arrow">→</span>

      </button>

      <button

        class="main-button morning-delivery"

        type="button"

       onclick="location.href='morning-delivery.html'"
      >

        <span class="icon-wrap">

          <span class="icon">🚚</span>

        </span>

        <strong>아침 배송</strong>

        <small>

          오늘 저녁 9시까지 주문<br />

          다음 날 아침 배송

        </small>

        <span class="arrow">→</span>

      </button>

    </section>

    <p class="origin">

      국내산 한우 · 한돈만 취급합니다.

    </p>

  </main>

</body>

</html>

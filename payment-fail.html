<!DOCTYPE html>

<html lang="ko">

<head>

  <meta charset="UTF-8" />

  <meta

    name="viewport"

    content="width=device-width, initial-scale=1, viewport-fit=cover"

  />

  <meta name="theme-color" content="#fff8f8" />

  <title>결제 실패 | 한농직판장</title>

  <style>

    :root {

      --green: #235f3f;

      --red: #c62828;

      --red-soft: #fff0f0;

      --text: #171717;

      --muted: #666666;

    }

    * {

      box-sizing: border-box;

    }

    body {

      margin: 0;

      min-height: 100dvh;

      background: #fff8f8;

      color: var(--text);

      font-family:

        -apple-system,

        BlinkMacSystemFont,

        "Apple SD Gothic Neo",

        "Noto Sans KR",

        sans-serif;

      -webkit-font-smoothing: antialiased;

    }

    a,

    button {

      font: inherit;

    }

    .page {

      display: flex;

      align-items: center;

      justify-content: center;

      width: min(100%, 720px);

      min-height: 100dvh;

      margin: 0 auto;

      padding:

        calc(24px + env(safe-area-inset-top))

        18px

        calc(24px + env(safe-area-inset-bottom));

    }

    .card {

      width: 100%;

      max-width: 480px;

      padding: 34px 22px 24px;

      border: 1px solid #f0d7d7;

      border-radius: 28px;

      background: #ffffff;

      text-align: center;

      box-shadow: 0 16px 45px rgba(0, 0, 0, 0.08);

    }

    .status-icon {

      display: grid;

      place-items: center;

      width: 74px;

      height: 74px;

      margin: 0 auto 18px;

      border-radius: 50%;

      background: var(--red-soft);

      color: var(--red);

      font-size: 38px;

      font-weight: 900;

    }

    h1 {

      margin: 0;

      color: var(--red);

      font-size: 29px;

      line-height: 1.25;

      letter-spacing: -0.045em;

    }

    .description {

      margin: 14px 0 0;

      color: var(--muted);

      font-size: 16px;

      line-height: 1.65;

      font-weight: 650;

      word-break: keep-all;

    }

    .error-box {

      margin-top: 22px;

      padding: 17px;

      border-radius: 18px;

      background: var(--red-soft);

      text-align: left;

    }

    .error-label {

      display: block;

      margin-bottom: 7px;

      color: var(--red);

      font-size: 14px;

      font-weight: 900;

    }

    .error-message {

      margin: 0;

      color: #444444;

      font-size: 15px;

      line-height: 1.55;

      font-weight: 700;

      word-break: keep-all;

    }

    .order-id {

      display: none;

      margin-top: 12px;

      color: #777777;

      font-size: 12px;

      line-height: 1.5;

      word-break: break-all;

    }

    .buttons {

      display: grid;

      gap: 10px;

      margin-top: 22px;

    }

    .button {

      display: flex;

      align-items: center;

      justify-content: center;

      width: 100%;

      min-height: 56px;

      padding: 13px;

      border: 0;

      border-radius: 17px;

      text-decoration: none;

      font-size: 16px;

      font-weight: 900;

      cursor: pointer;

    }

    .retry-button {

      background: var(--green);

      color: #ffffff;

    }

    .kakao-button {

      background: #fee500;

      color: #111111;

    }

    .home-button {

      background: #eeeeee;

      color: #333333;

    }

  </style>

</head>

<body>

  <main class="page">

    <section class="card">

      <div class="status-icon">!</div>

      <h1>결제를 완료하지 못했습니다</h1>

      <p class="description">

        결제가 취소되었거나 처리 중 문제가 발생했습니다.<br />

        주문내용은 결제되지 않았습니다.

      </p>

      <div class="error-box">

        <span class="error-label">확인 내용</span>

        <p class="error-message" id="errorMessage">

          결제창이 닫혔거나 결제가 취소되었습니다.

        </p>

        <div class="order-id" id="orderIdText"></div>

      </div>

      <div class="buttons">

        <a

          class="button retry-button"

          href="morning-delivery.html"

        >

          아침배송으로 돌아가기

        </a>

        <a

          class="button kakao-button"

          href="https://pf.kakao.com/_rjhxen/chat"

        >

          카카오톡 문의

        </a>

        <a

          class="button home-button"

          href="index.html"

        >

          첫 화면으로 돌아가기

        </a>

      </div>

    </section>

  </main>

  <script>

    const params =

      new URLSearchParams(window.location.search);

    const code =

      params.get("code");

    const message =

      params.get("message");

    const orderId =

      params.get("orderId");

    const knownMessages = {

      PAY_PROCESS_CANCELED:

        "결제 진행 중 취소되었습니다.",

      PAY_PROCESS_ABORTED:

        "결제 진행 중 오류가 발생했습니다.",

      REJECT_CARD_COMPANY:

        "카드사에서 결제를 거절했습니다.",

      BELOW_MINIMUM_AMOUNT:

        "결제 가능한 최소 금액보다 작습니다.",

      INVALID_CARD_EXPIRATION:

        "카드 유효기간을 확인해주세요.",

      INVALID_STOPPED_CARD:

        "정지된 카드입니다. 다른 카드를 이용해주세요.",

      EXCEED_MAX_DAILY_PAYMENT_COUNT:

        "하루 결제 가능 횟수를 초과했습니다."

    };

    const displayMessage =

      knownMessages[code] ||

      message ||

      "결제창이 닫혔거나 결제가 취소되었습니다.";

    document.getElementById(

      "errorMessage"

    ).textContent = displayMessage;

    if (orderId) {

      const orderIdText =

        document.getElementById("orderIdText");

      orderIdText.textContent =

        "주문번호: " + orderId;

      orderIdText.style.display = "block";

    }

  </script>

</body>

</html>
